<!DOCTYPE html>
<html>
<head>
  <title>Callback Investigation Console</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1f2937;
      padding: 32px;
      border-radius: 12px;
      width: 320px;
    }

    h1 {
      margin-top: 0;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Callback Investigation Console</h1>

    <div class="subtitle">
      Investigator Login
    </div>

    <form method="POST" action="/login">
      <input
        type="email"
        name="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        required
      />

      <button type="submit">
        Login
      </button>
    </form>
  </div>
</body>
</html>
